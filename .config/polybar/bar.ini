include-file = colors.ini
include-file = modules.ini

[base]
width = 100%
height = 25pt
dpi = ${xrdb:Xft.dpi:96}

enable-ipc = true
locale = en_US.UTF-8
wm-name = i3

border-size = 6pt
border-bottom-size = 0
line-size = 4pt

font-0 = "Hack Nerd Font:size=12;4"
font-1 = "Hack Nerd Font:size=12:style=Bold;4"
background = ${colors.crust}
foreground = ${colors.text}

module-margin = 1
modules-left =  i3 battery backlight pulseaudio
modules-center = time sep date
modules-right =  keyboard dunst sep memory cpu root tray

[settings]
screenchange-reload = true
pseudo-transparency = true
