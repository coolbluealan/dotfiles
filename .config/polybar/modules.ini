[module/i3]
type = internal/i3
wrapping-scroll = false

label-mode-foreground = ${colors.red}
label-mode-underline = ${colors.red}
label-mode-padding = 1

label-focused = %name%
label-focused-background = ${colors.surface0}
label-focused-underline = ${colors.green}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-background = ${colors.mantle}
label-unfocused-padding = 1

label-visible = %name%
label-visible-background = ${colors.surface0}
label-visible-underline = ${colors.lavender}
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.mantle}
label-urgent-underline = ${colors.red}
label-urgent-padding = 1

[module/memory]
type = internal/memory
interval = 3

format-prefix = "î‰¦ "
format-prefix-foreground = ${colors.peach}
label = %free%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
click-right = pavucontrol

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage:2%%

format-muted = <label-muted> mute
label-muted = î¬¤
label-muted-foreground = ${colors.blue}

ramp-volume-foreground = ${colors.blue}
ramp-volume-0 = ï€¦
ramp-volume-1 = ï€§
ramp-volume-2 = ï€¨

[module/root]
type = internal/fs
format-mounted-prefix = "ï‚  "
format-mounted-prefix-foreground = "${colors.red}"
label-mounted = %free%

[module/sep]
type = custom/text
format = |
format-foreground = ${colors.subtext0}

[module/time]
type = internal/date
label = %time%

format-prefix = "ï€— "
format-prefix-foreground = ${colors.sapphire}

time = %I:%M %p
time-alt = %T %Z

[module/tray]
type = internal/tray
tray-spacing = 5pt
tray-background = ${colors.base}

format-background = ${colors.base}
format-padding = 5pt

[module/keyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

label-layout-foreground = ${colors.green}
label-indicator-on-capslock = CAPS
label-indicator-on-capslock-foreground = ${colors.mauve}
