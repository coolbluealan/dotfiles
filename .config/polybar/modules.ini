date-alt = %D

[module/dunst]
type = custom/ipc
initial = 1
format-foreground = ${colors.yellow}

hook-0 = echo "ïƒ³" && dunstctl set-paused false
hook-1 = echo "ï‡¶" && dunstctl set-paused true
